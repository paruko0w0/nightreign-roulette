<!doctype html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nightreign Roulette</title>
<style>
/* =========================
   Nightreign Roulette v2
   黒背景 / 4人 / 12枠 / 個別停止 / 全員同時停止 / 休みボタン
   ========================= */

* {
  box-sizing: border-box;
}

html, body {
  margin: 0;
  min-height: 100%;
}

body {
  min-height: 100vh;
  color: #ffffff;
  font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", "Noto Sans JP", sans-serif;
  background:
    radial-gradient(circle at 50% -12%, rgba(100, 116, 139, 0.48), transparent 32%),
    radial-gradient(circle at 10% 10%, rgba(37, 99, 235, 0.18), transparent 28%),
    radial-gradient(circle at 90% 6%, rgba(168, 85, 247, 0.12), transparent 26%),
    linear-gradient(180deg, #04060b 0%, #111827 48%, #05070c 100%);
  overflow-x: hidden;
}

body::before {
  content: "";
  position: fixed;
  inset: 0;
  pointer-events: none;
  opacity: 0.22;
  background-image:
    radial-gradient(circle, rgba(255,255,255,0.34) 0 1.5px, transparent 2.6px),
    radial-gradient(circle, rgba(255,255,255,0.13) 0 1px, transparent 2px);
  background-size: 92px 92px, 54px 54px;
  background-position: 18px 24px, 8px 12px;
}

.app {
  position: relative;
  width: min(1180px, 96vw);
  margin: 0 auto;
  padding: 22px 0 30px;
}

.header {
  text-align: center;
  margin-bottom: 16px;
}

.title {
  margin: 0;
  font-size: clamp(34px, 5.4vw, 64px);
  line-height: 1;
  letter-spacing: 0.05em;
  color: #ffffff;
  text-shadow:
    0 5px 0 rgba(0,0,0,0.55),
    0 13px 30px rgba(0,0,0,0.55);
}

.subtitle {
  margin: 9px 0 0;
  color: rgba(255,255,255,0.78);
  font-size: 17px;
  font-weight: 800;
}

.global-controls {
  display: flex;
  justify-content: center;
  gap: 12px;
  flex-wrap: wrap;
  margin: 0 0 18px;
}

.players {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 14px;
}

.card {
  position: relative;
  min-height: 590px;
  padding: 14px;
  border-radius: 28px;
  border: 2px solid rgba(255,255,255,0.34);
  background:
    linear-gradient(180deg, rgba(255,255,255,0.12), rgba(255,255,255,0.055));
  box-shadow:
    0 20px 40px rgba(0,0,0,0.42),
    inset 0 0 0 1px rgba(255,255,255,0.10);
  overflow: hidden;
}

.card::after {
  content: "";
  position: absolute;
  inset: -45% -30%;
  background: radial-gradient(circle, rgba(255,255,255,0.11), transparent 42%);
  transform: translateY(-38%);
  pointer-events: none;
}

.card.is-off {
  opacity: 0.42;
  filter: grayscale(0.8);
}

.player-name {
  position: relative;
  z-index: 1;
  display: inline-flex;
  justify-content: center;
  align-items: center;
  min-width: 112px;
  padding: 8px 18px;
  border-radius: 999px;
  font-size: 27px;
  font-weight: 900;
  color: #ffffff;
  text-shadow: 0 2px 0 rgba(0,0,0,0.35);
  box-shadow:
    inset 0 -5px 0 rgba(0,0,0,0.28),
    0 9px 18px rgba(0,0,0,0.25);
}

.window {
  position: relative;
  z-index: 1;
  height: 375px;
  margin: 16px 0 12px;
  display: grid;
  place-items: center;
  overflow: hidden;
  border-radius: 24px;
  background:
    radial-gradient(circle at 50% 30%, rgba(255,255,255,0.20), transparent 55%),
    linear-gradient(180deg, rgba(15,23,42,0.92), rgba(2,6,23,0.80));
  border: 1px solid rgba(255,255,255,0.22);
  box-shadow:
    inset 0 0 0 2px rgba(255,255,255,0.06),
    inset 0 -20px 42px rgba(0,0,0,0.28);
}

.window img {
  width: 94%;
  height: 94%;
  object-fit: contain;
  filter: drop-shadow(0 13px 8px rgba(0,0,0,0.42));
  user-select: none;
  pointer-events: none;
}

.question {
  font-size: 116px;
  font-weight: 900;
  color: rgba(255,255,255,0.92);
  text-shadow: 0 5px 0 rgba(0,0,0,0.35);
}

.character-name {
  position: relative;
  z-index: 1;
  min-height: 48px;
  margin: 0 0 12px;
  display: grid;
  place-items: center;
  font-size: 31px;
  font-weight: 900;
  text-shadow:
    0 4px 0 rgba(0,0,0,0.45),
    0 10px 20px rgba(0,0,0,0.35);
}

.buttons {
  position: relative;
  z-index: 1;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  margin-bottom: 8px;
}

button {
  border: 0;
  cursor: pointer;
  border-radius: 16px;
  padding: 13px 8px;
  color: #ffffff;
  font-size: 18px;
  font-weight: 900;
  letter-spacing: 0.04em;
  text-shadow: 0 2px 0 rgba(0,0,0,0.28);
  box-shadow:
    inset 0 -5px 0 rgba(0,0,0,0.24),
    0 8px 16px rgba(0,0,0,0.24);
  transition: transform 0.06s ease, filter 0.12s ease;
}

button:hover {
  filter: brightness(1.07);
}

button:active {
  transform: translateY(2px);
  box-shadow:
    inset 0 -3px 0 rgba(0,0,0,0.24),
    0 5px 12px rgba(0,0,0,0.18);
}

.start,
.start-all {
  background: linear-gradient(180deg, #34d399, #059669);
}

.stop,
.stop-all {
  background: linear-gradient(180deg, #fb7185, #dc2626);
}

.dayoff {
  width: 100%;
  background: linear-gradient(180deg, #64748b, #334155);
}

.reset {
  background: linear-gradient(180deg, #475569, #1e293b);
}

.global-controls button {
  min-width: 170px;
  border-radius: 999px;
  padding: 14px 22px;
  font-size: 20px;
}

.card.is-rolling .window {
  animation: roll 0.075s linear infinite;
}

.card.is-rolling .character-name {
  animation: blink 0.18s linear infinite;
}

.card.is-off .window {
  background:
    linear-gradient(180deg, rgba(30,41,59,0.88), rgba(15,23,42,0.88));
}

.card.is-off .character-name {
  font-size: 0;
}

.card.is-off .character-name::after {
  content: "休み";
  font-size: 31px;
}

@keyframes roll {
  0% { transform: translateY(0) scale(1); }
  50% { transform: translateY(-2px) scale(1.025); }
  100% { transform: translateY(0) scale(1); }
}

@keyframes blink {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.72; }
}

@media (max-width: 980px) {
  .players {
    grid-template-columns: repeat(2, 1fr);
  }

  .card {
    min-height: 520px;
  }

  .window {
    height: 315px;
  }
}

@media (max-width: 560px) {
  .app {
    width: min(430px, 94vw);
  }

  .players {
    grid-template-columns: 1fr;
  }

  .card {
    min-height: auto;
  }
}
</style>
</head>
<body>
<main class="app">
  <header class="header">
    <h1 class="title">キャラルーレット</h1>
    <p class="subtitle">10キャラ＋自由＋同キャラ</p>
  </header>

  <div class="global-controls">
    <button type="button" class="start-all" id="startAll">全員スタート</button>
    <button type="button" class="stop-all" id="stopAll">全員ストップ</button>
    <button type="button" class="reset" id="reset">リセット</button>
  </div>

  <section class="players" id="players"></section>
</main>

<script>
/* =========================
   Data
   ========================= */

const PLAYERS = [
  {
    "name": "すず",
    "color": "#ef4444"
  },
  {
    "name": "とみた",
    "color": "#22c55e"
  },
  {
    "name": "ぱるこ",
    "color": "#3b82f6"
  },
  {
    "name": "けたん",
    "color": "#a855f7"
  }
];

const CHARACTERS = [
  {
    "name": "追跡者",
    "image": "images/01.png"
  },
  {
    "name": "守護者",
    "image": "images/02.png"
  },
  {
    "name": "鉄の目",
    "image": "images/03.png"
  },
  {
    "name": "レディ",
    "image": "images/04.png"
  },
  {
    "name": "無頼漢",
    "image": "images/05.png"
  },
  {
    "name": "復讐者",
    "image": "images/06.png"
  },
  {
    "name": "隠者",
    "image": "images/07.png"
  },
  {
    "name": "執行者",
    "image": "images/08.png"
  },
  {
    "name": "葬儀屋",
    "image": "images/09.png"
  },
  {
    "name": "学者",
    "image": "images/10.png"
  },
  {
    "name": "自由",
    "image": "images/11.png"
  },
  {
    "name": "同キャラ",
    "image": "images/12.png"
  }
];

/* =========================
   State
   ========================= */

let current = PLAYERS.map(() => null);
let intervals = PLAYERS.map(() => null);
let off = PLAYERS.map(() => false);

const playersEl = document.getElementById("players");

/* =========================
   Utility
   ========================= */

function pickCharacter() {
  return CHARACTERS[Math.floor(Math.random() * CHARACTERS.length)];
}

function imageHTML(character) {
  if (!character) {
    return '<div class="question">?</div>';
  }
  return `<img src="${character.image}" alt="${character.name}">`;
}

function cardElement(index) {
  return document.querySelector(`[data-card="${index}"]`);
}

function windowElement(index) {
  return document.querySelector(`[data-window="${index}"]`);
}

function nameElement(index) {
  return document.querySelector(`[data-result-name="${index}"]`);
}

function offButton(index) {
  return document.querySelector(`[data-action="off"][data-index="${index}"]`);
}

/* =========================
   Render
   ========================= */

function renderAll() {
  playersEl.innerHTML = PLAYERS.map((player, index) => {
    const character = current[index];
    const rollingClass = intervals[index] ? "is-rolling" : "";
    const offClass = off[index] ? "is-off" : "";

    return `
      <article class="card ${rollingClass} ${offClass}" data-card="${index}">
        <div class="player-name" style="background:${player.color}">${player.name}</div>

        <div class="window" data-window="${index}">
          ${imageHTML(character)}
        </div>

        <p class="character-name" data-result-name="${index}">
          ${character ? character.name : "未決定"}
        </p>

        <div class="buttons">
          <button type="button" class="start" data-action="start" data-index="${index}">スタート</button>
          <button type="button" class="stop" data-action="stop" data-index="${index}">ストップ</button>
        </div>

        <button type="button" class="dayoff" data-action="off" data-index="${index}">
          ${off[index] ? "参加に戻す" : "休みにする"}
        </button>
      </article>
    `;
  }).join("");
}

function renderOne(index) {
  const card = cardElement(index);
  const win = windowElement(index);
  const name = nameElement(index);
  const offBtn = offButton(index);

  if (!card || !win || !name) return;

  const character = current[index];

  card.classList.toggle("is-rolling", Boolean(intervals[index]));
  card.classList.toggle("is-off", Boolean(off[index]));

  win.innerHTML = imageHTML(character);
  name.textContent = character ? character.name : "未決定";

  if (offBtn) {
    offBtn.textContent = off[index] ? "参加に戻す" : "休みにする";
  }
}

/* =========================
   Roulette functions
   ========================= */

function tick(index) {
  current[index] = pickCharacter();
  renderOne(index);
}

function startOne(index) {
  if (off[index]) return;
  if (intervals[index]) return;

  current[index] = pickCharacter();
  renderOne(index);

  intervals[index] = window.setInterval(() => {
    tick(index);
  }, 70);

  renderOne(index);
}

function stopOne(index) {
  if (!intervals[index]) return;

  window.clearInterval(intervals[index]);
  intervals[index] = null;

  current[index] = pickCharacter();
  renderOne(index);
}

function toggleOff(index) {
  if (intervals[index]) {
    window.clearInterval(intervals[index]);
    intervals[index] = null;
  }

  off[index] = !off[index];

  if (off[index]) {
    current[index] = null;
  }

  renderOne(index);
}

function startAll() {
  PLAYERS.forEach((_, index) => {
    if (!off[index]) {
      startOne(index);
    }
  });
}

function stopAll() {
  // setTimeoutを使わず、同一ループ内で全員を一斉停止
  PLAYERS.forEach((_, index) => {
    if (!off[index]) {
      stopOne(index);
    }
  });
}

function resetAll() {
  intervals.forEach((timer) => {
    if (timer) {
      window.clearInterval(timer);
    }
  });

  current = PLAYERS.map(() => null);
  intervals = PLAYERS.map(() => null);
  off = PLAYERS.map(() => false);

  renderAll();
}

/* =========================
   Event delegation
   ========================= */

playersEl.addEventListener("click", (event) => {
  const button = event.target.closest("button[data-action]");
  if (!button) return;

  const index = Number(button.dataset.index);
  const action = button.dataset.action;

  if (action === "start") startOne(index);
  if (action === "stop") stopOne(index);
  if (action === "off") toggleOff(index);
});

document.getElementById("startAll").addEventListener("click", startAll);
document.getElementById("stopAll").addEventListener("click", stopAll);
document.getElementById("reset").addEventListener("click", resetAll);

/* =========================
   Preload images
   ========================= */

CHARACTERS.forEach((character) => {
  const img = new Image();
  img.src = character.image;
});

renderAll();
</script>
</body>
</html>
