<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>4人用キャラルーレット</title>
<style>
:root{
  --bg:#05070c;
  --text:#fff;
  --muted:#b7bfce;
  --yellow:#ffe04b;
  --red:#ff3737;
  --green:#27d65f;
  --blue:#2d78ff;
  --purple:#c852ff;
}
*{box-sizing:border-box}
body{
  margin:0;
  min-height:100svh;
  font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif;
  color:var(--text);
  background:
    radial-gradient(circle at 50% -10%, rgba(255,224,75,.22), transparent 34%),
    radial-gradient(circle at 8% 12%, rgba(45,120,255,.18), transparent 30%),
    radial-gradient(circle at 92% 18%, rgba(255,55,55,.15), transparent 30%),
    linear-gradient(180deg,#111827,#05070c 74%);
  padding:14px;
}
.wrap{max-width:980px;margin:0 auto}
h1{
  margin:8px 0 4px;
  text-align:center;
  font-size:28px;
  letter-spacing:.04em;
  text-shadow:0 4px 0 #000,0 0 20px rgba(255,224,75,.25);
}
.sub{text-align:center;color:var(--muted);font-size:13px;line-height:1.45;margin-bottom:14px}
.board{
  background:rgba(255,255,255,.08);
  border:1px solid rgba(255,255,255,.16);
  border-radius:24px;
  padding:12px;
  box-shadow:0 22px 55px rgba(0,0,0,.48);
}
.players{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
}
.card{
  position:relative;
  background:linear-gradient(180deg,#1c2230,#0b0f18);
  border:4px solid #555;
  border-radius:18px;
  padding:10px;
  overflow:hidden;
  min-height:290px;
  transition:.15s ease;
}
.card.off{opacity:.30;filter:grayscale(1)}
.card:before{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,.13),transparent 45%);
  pointer-events:none;
}
.c0{border-color:var(--red)}
.c1{border-color:var(--green)}
.c2{border-color:var(--blue)}
.c3{border-color:var(--purple)}
.nameRow{display:flex;justify-content:space-between;gap:8px;align-items:center;margin-bottom:8px;position:relative;z-index:1}
.pname{font-size:15px;font-weight:1000;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.badge{font-size:10px;font-weight:1000;color:#08090d;background:#fff;border-radius:999px;padding:4px 7px;white-space:nowrap}
.result{
  min-height:178px;
  border-radius:14px;
  background:#03050a;
  border:1px solid rgba(255,255,255,.18);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:7px;
  position:relative;
  z-index:1;
  text-shadow:0 3px 0 #000;
  overflow:hidden;
}
.charImg{
  width:100%;
  height:132px;
  object-fit:cover;
  object-position:center top;
  border-radius:10px;
  display:none;
}
.charName{
  width:100%;
  margin-top:6px;
  font-size:24px;
  font-weight:1000;
  letter-spacing:.04em;
  line-height:1.1;
}
.placeholder{
  font-size:44px;
  font-weight:1000;
}
.spin .result{
  animation:shake .10s infinite alternate;
  box-shadow:0 0 28px rgba(255,224,75,.25) inset;
}
@keyframes shake{
  from{transform:translateX(-1px) scale(.99);filter:brightness(.82)}
  to{transform:translateX(1px) scale(1.03);filter:brightness(1.38)}
}
button{
  appearance:none;
  border:0;
  border-radius:14px;
  width:100%;
  padding:13px 10px;
  margin-top:9px;
  font-size:15px;
  font-weight:1000;
  background:var(--yellow);
  color:#111;
  box-shadow:0 5px 0 rgba(0,0,0,.36);
  position:relative;
  z-index:1;
}
button:active{transform:translateY(2px);box-shadow:0 3px 0 rgba(0,0,0,.36)}
.stopBtn{background:#ff6666;color:#fff}
.miniBtn{font-size:12px;padding:9px 8px;border-radius:11px;background:#374151;color:#fff}
.controlGrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}
.controlGrid button{font-size:17px;padding:15px 10px}
.modeGrid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:10px}
details{
  margin-top:14px;
  background:rgba(18,23,34,.96);
  border:1px solid rgba(255,255,255,.14);
  border-radius:22px;
  padding:13px;
}
summary{font-size:18px;font-weight:1000;cursor:pointer;list-style:none}
summary::-webkit-details-marker{display:none}
.settingsGrid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-top:12px}
.setBox{background:#080c14;border:1px solid rgba(255,255,255,.15);border-radius:16px;padding:10px}
label{display:block;color:#cbd5e1;font-size:12px;font-weight:900;margin:8px 0 5px}
input,textarea{
  width:100%;
  border-radius:12px;
  border:1px solid #344052;
  background:#030712;
  color:#fff;
  padding:10px;
  font-size:15px;
  font-family:inherit;
}
textarea{min-height:125px;line-height:1.45;resize:vertical}
.checkRow{display:flex;align-items:center;gap:8px;margin-top:8px;color:#d1d5db;font-size:13px;font-weight:800}
.checkRow input{width:auto}
.footerBtns{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px}
.hint{color:var(--muted);font-size:12px;line-height:1.55;margin-top:10px}
.toast{
  position:fixed;
  left:50%;
  bottom:22px;
  transform:translateX(-50%);
  background:#fff;
  color:#111;
  padding:10px 16px;
  border-radius:999px;
  font-weight:1000;
  display:none;
  box-shadow:0 10px 30px rgba(0,0,0,.38);
  z-index:99;
}
@media(max-width:900px){
  .players{grid-template-columns:repeat(2,1fr)}
}
@media(max-width:560px){
  body{padding:10px}
  h1{font-size:24px}
  .players{grid-template-columns:1fr}
  .settingsGrid{grid-template-columns:1fr}
  .modeGrid{grid-template-columns:1fr 1fr}
  .result{min-height:210px}
  .charImg{height:160px}
  .card{min-height:auto}
}
</style>
</head>
<body>
<div class="wrap">
  <h1>キャラルーレット</h1>
  <div class="sub">4人用／画像＋キャラ名／設定は各スマホに保存</div>

  <div class="board">
    <div class="players" id="players"></div>

    <div class="controlGrid">
      <button onclick="startActive()">参加者スタート</button>
      <button class="stopBtn" onclick="stopActive()">参加者ストップ</button>
    </div>

    <div class="modeGrid" id="quickToggles"></div>
  </div>

  <details>
    <summary>▼ 設定</summary>
    <div class="settingsGrid" id="settings"></div>
    <div class="footerBtns">
      <button onclick="saveData()">設定を保存・反映</button>
      <button class="stopBtn" onclick="resetData()">初期状態に戻す</button>
    </div>
    <div class="hint">
      候補キャラは1行に1キャラずつ入力。<br>
      「参加する」を外すと、その人だけルーレット対象外になります。
    </div>
  </details>
</div>

<div class="toast" id="toast">保存しました</div>

<script>
var characterImages={
  "追跡者":"images/tsuisekisha.webp",
  "鉄の目":"images/tetsunome.webp",
  "レディ":"images/lady.webp",
  "無頼漢":"images/buraikan.webp",
  "復讐者":"images/fukushusha.webp",
  "隠者":"images/inja.webp",
  "葬儀屋":"images/sogiya.webp",
  "執行者":"images/shikkosha.webp"
};

var defaultData=[
  {name:"すず",active:true,chars:["追跡者","隠者","レディ","復讐者","葬儀屋"]},
  {name:"とみた",active:true,chars:["追跡者","鉄の目","レディ","無頼漢","復讐者"]},
  {name:"ぱるこ",active:true,chars:["追跡者","鉄の目","レディ","無頼漢","復讐者"]},
  {name:"けたん",active:true,chars:["追跡者","鉄の目","レディ","復讐者","執行者"]}
];
var labels=["RED","GREEN","BLUE","PURPLE"];
var STORAGE_KEY="nightreign_roulette_image_version_v1";
var data=JSON.parse(localStorage.getItem(STORAGE_KEY)||"null")||JSON.parse(JSON.stringify(defaultData));
var timers=[null,null,null,null];

function esc(s){
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}
function resultHtml(name){
  var img=characterImages[name];
  if(img){
    return '<img class="charImg" src="'+img+'" style="display:block" alt="'+esc(name)+'"><div class="charName">'+esc(name)+'</div>';
  }
  if(name==="？" || name==="休み"){
    return '<div class="placeholder">'+esc(name)+'</div>';
  }
  return '<div class="charName">'+esc(name)+'</div>';
}
function draw(){
  var p=document.getElementById("players");
  var s=document.getElementById("settings");
  var q=document.getElementById("quickToggles");
  p.innerHTML="";
  s.innerHTML="";
  q.innerHTML="";
  for(var i=0;i<4;i++){
    p.innerHTML += '<div class="card c'+i+(data[i].active?'':' off')+'" id="card'+i+'">'
      + '<div class="nameRow"><div class="pname">'+esc(data[i].name)+'</div><div class="badge">'+labels[i]+'</div></div>'
      + '<div id="r'+i+'" class="result">'+resultHtml(data[i].active?'？':'休み')+'</div>'
      + '<button id="b'+i+'" onclick="toggle('+i+')">'+(data[i].active?'スタート':'休み中')+'</button>'
      + '</div>';

    q.innerHTML += '<button class="miniBtn" onclick="toggleActive('+i+')">'+esc(data[i].name)+'：'+(data[i].active?'参加':'休み')+'</button>';

    s.innerHTML += '<div class="setBox">'
      + '<b>プレイヤー'+(i+1)+'</b>'
      + '<label>名前</label>'
      + '<input id="n'+i+'" value="'+esc(data[i].name)+'">'
      + '<label>候補キャラ</label>'
      + '<textarea id="t'+i+'">'+esc(data[i].chars.join("\\n"))+'</textarea>'
      + '<label class="checkRow"><input type="checkbox" id="a'+i+'" '+(data[i].active?'checked':'')+'>参加する</label>'
      + '</div>';
  }
}
function rand(i){
  if(!data[i].chars || data[i].chars.length===0)return "未設定";
  return data[i].chars[Math.floor(Math.random()*data[i].chars.length)];
}
function showResult(i,name){
  document.getElementById("r"+i).innerHTML=resultHtml(name);
}
function start(i){
  if(!data[i].active)return;
  if(timers[i])return;
  document.getElementById("b"+i).innerText="ストップ";
  document.getElementById("b"+i).className="stopBtn";
  document.getElementById("card"+i).classList.add("spin");
  timers[i]=setInterval(function(){showResult(i,rand(i));},75);
}
function stop(i){
  if(!timers[i])return;
  clearInterval(timers[i]);
  timers[i]=null;
  showResult(i,rand(i));
  document.getElementById("b"+i).innerText="スタート";
  document.getElementById("b"+i).className="";
  document.getElementById("card"+i).classList.remove("spin");
}
function toggle(i){timers[i]?stop(i):start(i)}
function startActive(){for(var i=0;i<4;i++)start(i)}
function stopActive(){for(var i=0;i<4;i++)stop(i)}
function toggleActive(i){
  if(timers[i])stop(i);
  data[i].active=!data[i].active;
  localStorage.setItem(STORAGE_KEY,JSON.stringify(data));
  draw();
}
function saveData(){
  for(var i=0;i<4;i++){
    var nm=document.getElementById("n"+i).value.trim();
    var list=document.getElementById("t"+i).value.split("\\n").map(function(x){return x.trim();}).filter(function(x){return x;});
    if(list.length===0){alert("プレイヤー"+(i+1)+"の候補キャラを入れてください");return;}
    data[i].name=nm||("プレイヤー"+(i+1));
    data[i].chars=list;
    data[i].active=document.getElementById("a"+i).checked;
  }
  localStorage.setItem(STORAGE_KEY,JSON.stringify(data));
  for(var j=0;j<4;j++){if(timers[j]){clearInterval(timers[j]);timers[j]=null;}}
  draw();
  showToast("保存しました");
}
function resetData(){
  if(!confirm("初期状態に戻しますか？"))return;
  localStorage.removeItem(STORAGE_KEY);
  data=JSON.parse(JSON.stringify(defaultData));
  for(var i=0;i<4;i++){if(timers[i])clearInterval(timers[i]);timers[i]=null;}
  draw();
  showToast("戻しました");
}
function showToast(msg){
  var t=document.getElementById("toast");
  t.innerText=msg;
  t.style.display="block";
  setTimeout(function(){t.style.display="none";},1300);
}
draw();
</script>
</body>
</html>
